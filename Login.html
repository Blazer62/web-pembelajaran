<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <title>Login</title>
    <link rel="icon" type="image/x-icon" href="Image/Logo SMKN.png" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(to right, #e0e0e0, #ffffff);
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .login-box {
        background: white;
        padding: 40px 30px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 400px;
        text-align: center;
      }

      .login-box h2 {
        margin-bottom: 20px;
        color: #8b0000;
        font-size: 28px;
      }

      .login-box img {
        max-width: 100%;
        height: auto;
        margin-bottom: 20px;
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
      }

      button {
        background-color: #8b0000;
        color: white;
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
        transition: background-color 0.3s ease;
      }

      button:hover {
        background-color: #a30000;
      }

      @media (max-width: 768px) {
        .login-box {
          padding: 35px 25px;
        }

        .login-box h2 {
          font-size: 26px;
        }
      }

      @media (max-width: 480px) {
        .login-box {
          padding: 30px 20px;
          margin: 20px;
        }

        .login-box h2 {
          font-size: 22px;
        }

        input[type="text"],
        input[type="password"],
        button {
          font-size: 15px;
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <img
        src="https://epjj.smkn2-bjm.sch.id/pluginfile.php/1/core_admin/logo/0x200/1744262310/ELEARNINGok2.png"
        alt="Logo SMKN 2"
      />
      <form id="loginForm">
        <input
          type="text"
          id="username"
          placeholder="Masukkan nama Anda"
          required
        />
        <input
          type="password"
          id="password"
          placeholder="Kata sandi"
          required
        />
        <button type="submit">Masuk</button>
      </form>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const username = document.getElementById("username").value.trim();
          const password = document.getElementById("password").value;

          if (username.length < 3) {
            alert("Nama harus minimal 3 karakter.");
            return;
          }

          if (password.length < 6) {
            alert("Kata sandi harus minimal 6 karakter.");
            return;
          }

          sessionStorage.setItem("username", username);
          window.location.href = "Beranda.html";
        });
    </script>
  </body>
</html>
